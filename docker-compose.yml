services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ody
      POSTGRES_PASSWORD: ody_secret
      POSTGRES_DB: ody_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ody -d ody_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
